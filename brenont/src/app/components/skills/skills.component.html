<section class="pt-3 pb-3">
  <div class="pb-3 pl-3">
    <h2>SKILLS</h2>
    <div class="text-border"></div>
  </div>

  <div class="m-3" *ngFor="let skill of skills">
    <app-progressbar name="{{skill.name}}" value="{{skill.value}}" color="{{skill.color}}"></app-progressbar>
  </div>

</section>
