<label for="Html" class="pl-3">{{name}}</label>
<div class="progress shadow-bx-bd" on-mouseover="progressOver=true"
(mouseleave)="progressOver=false">
  <div class="progress-bar progress-bar-animated"
  [ngClass]="{'progress-bar-striped': progressOver}"
  role="progressbar"
  [style.width]="value"
  aria-valuemin="0"
  aria-valuemax="100">{{value}}</div>
</div>
