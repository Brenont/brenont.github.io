<section class="pt-4 pb-5">
<div class="container shadow-bx" on-mouseover="cardHover=true" (mouseleave)="cardHover=false" [ngClass]="{'container-hover': cardHover}">
  <div class="title-area pl-3">
    <h2 class="title">{{date.title}}</h2>
    <div class="title-border"></div>
  </div>
  <!-- <h1>Breno Nunes</h1> -->
  <div class="card pt-3">
    <img src="../../../assets/img/me.jpg" class="card-img-top shadow-bx" alt="Breno Nunes">
    <div class="card-body">
      <h5 class="card-title">{{date.myName}}</h5>
      <p class="card-text" *ngFor="let intro of date.intros">{{intro}}</p>
      <div class="text-hided" [ngClass]="{'card-text-hover': cardHover}">
        <p class="card-text" *ngFor="let textExtra of date.textsExtra">{{textExtra}}</p>
      </div>
    </div>
  </div>
</div>
</section>
